<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"/>
    <title>Invenire</title>
    <base href="/" />
    <link rel="stylesheet" href="Invenire.styles.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <div id="app">
        <div id="loading-screen">
            <svg class="loading-progress">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-text">Načítání...</div>
        </div>
    </div>
    <div id="blazor-error-ui" class="blazor-error-ui">
        Objevila se nečekaná chyba. Zkuste to prosím později.
        <span class="dismiss">🗙</span>
    </div>
    <script src="_content/BlazorBarcodeScanner.ZXing.JS/zxingjs.index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="_content/BlazorBarcodeScanner.ZXing.JS/BlazorBarcodeScanner.js"></script>
    <script>
        window.download_file = (name, type, content) => {
            const blob = new Blob([content], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
            URL.revokeObjectURL(url);
        };
    </script>
    <script>
        window.excel_reader = {
            get_headers_from_bytes: async function (byte_array) {
                return new Promise((resolve, reject) => {
                    try {
                        if (!byte_array || byte_array.length === 0) {
                            reject(new Error("Přečtená data souboru jsou prázdná."));
                            return;
                        }

                        const workbook = XLSX.read(byte_array, { type: 'array' });
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const range = XLSX.utils.decode_range(sheet['!ref']);
                        const headers = [];
                        const firstRow = range.s.r;

                        for (let col = range.s.c; col <= range.e.c; ++col) {
                            const cellAddress = XLSX.utils.encode_col(col); // e.g. "A", "B", "C"
                            const cell = sheet[XLSX.utils.encode_cell({ r: firstRow, c: col })];

                            // Return both the value and the letter
                            const headerName = cell ? cell.v : `Sloupec ${col + 1}`;
                            headers.push({ name: headerName, letter: cellAddress });
                        }

                        resolve(headers);
                    } catch (err) {
                        console.error("Chyba při zpracování Excel souboru:", err);
                        reject(new Error("Chyba při zpracování Excel souboru: " + err.message));
                    }
                });
            }
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
